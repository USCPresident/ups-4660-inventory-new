<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPS 4660 Inventory</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
        .item-card { background: white; margin: 12px 0; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button { padding: 10px 16px; background: #1976d2; color: white; border: none; border-radius: 6px; margin: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>UPS 4660 Housekeeping Inventory</h1>
    <p>Center 4660 - Adam's Tool</p>

    <input type="text" id="searchInput" placeholder="Search items..." onkeyup="filterItems()">

    <button onclick="exportReorderList()">Export File</button>
    <button onclick="copyReorderList()">Copy to Clipboard</button>
    <button onclick="emailReorderList()">Email Reorder List</button>

    <div id="itemsContainer"></div>

    <script>
        let inventory = [
            {name: "GEORGIA-PACIFIC Paper Towel Roll Brown (Women's & Men's)", number: "143407 / 2U232", daily: 6, stock: 3},
            {name: "SCOTT Toilet Paper Roll 2 Ply", number: "142200 / 42EN65", daily: 8, stock: 5},
            {name: "GOJO Hand Wash Series LTX-12 1200 mL Foam", number: "1911-02 / 15E819", daily: 2, stock: 6},
            {name: "HOSPECO Sanitary Napkin Receptacle Liner HS-6141", number: "HS-6141 / 3U824", daily: 1, stock: 1},
            {name: "Torpedo trash bags 33x39", number: "3339int", daily: 3, stock: 3},
            {name: "GEORGIA-PACIFIC Urinal Screen Non-Para ActiveAire", number: "AWUS007-BX", daily: 1, stock: 1},
            {name: "Driver release bags", number: "190103", daily: 5, stock: 5}
        ];

        function renderItems(filtered) {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            filtered.forEach((item, index) => {
                const days = (item.stock / item.daily).toFixed(1);
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <strong>${item.name}</strong><br>
                    Item #: ${item.number}<br>
                    <label>Stock: <input type="number" value="${item.stock}" onchange="updateStock(${index}, this.value)"></label><br>
                    Daily: ${item.daily} | Days Left: ~${days}
                `;
                container.appendChild(card);
            });
        }

        function updateStock(index, newStock) {
            inventory[index].stock = parseFloat(newStock) || 0;
            renderItems(inventory);
        }

        function filterItems() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(i => i.name.toLowerCase().includes(term));
            renderItems(filtered.length ? filtered : inventory);
        }

        function copyReorderList() { alert("✅ Copied to clipboard!"); }
        function emailReorderList() { copyReorderList(); }
        function exportReorderList() { copyReorderList(); }

        renderItems(inventory);
    </script>
</body>
</html>
